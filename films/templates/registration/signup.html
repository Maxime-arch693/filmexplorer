{% extends "base.html" %}

{% block title %}Inscription - Film Explorer{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold">Créer un compte</h2>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <button type="submit" class="btn btn-success w-100 mt-3 py-2">S'inscrire</button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="text-muted mb-2">Vous avez déjà un compte ?</p>
                    <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100 py-2">Se connecter</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
